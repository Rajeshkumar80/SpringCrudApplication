spring.application.name=AI-Product-Management-System

# ==============================
# Server
# ==============================
server.port=8888

# ==============================
# MySQL Configuration
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3305/productdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==============================
# Spring AI - Ollama
# ==============================
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama3.2:1b
spring.ai.ollama.chat.options.temperature=0.7

# ==============================
# Logging
# ==============================
logging.level.com.example.Product=INFO
logging.level.org.springframework.ai=DEBUG
